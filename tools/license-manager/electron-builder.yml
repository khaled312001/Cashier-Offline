appId: com.barmagly.licensemanager
productName: Barmagly License Manager
copyright: Copyright © 2026 Barmagly

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

# Bundle the canonical vendor signing key so every install signs with the key
# the customer app trusts (internal tool — not shipped to customers).
extraResources:
  - from: resources
    to: resources

asarUnpack:
  - '**/node_modules/better-sqlite3/**'
  - '**/*.node'

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
